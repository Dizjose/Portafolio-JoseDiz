<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jose Manuel Diz Pernia | Programador Web Frontend</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="main-header">
        <div class="nav-container">
            <div class="brand-logo">
                <a href="#inicio" class="logo">
                <span class="accent-char">J</span>D
                </a>
            </div>

            <button class="menu-toggle" id="menuToggle" aria-label="Abrir menú">
                <i class="fas fa-bars"></i>
            </button>

            <nav class="nav-menu" id="navMenu">
                <button class="menu-close" id="menuClose" aria-label="Cerrar menú">
                    <i class="fas fa-times"></i>
                </button>
                <a href="#inicio" class="nav-link active">Inicio</a>
                <a href="#capacidades" class="nav-link">Capacidades</a>
                <a href="#proyectos" class="nav-link">Proyectos</a>

    <section id="inicio" class="hero-wrapper">

                <p class="hero-tagline">Hola, Soy</p>

                    Me apasiona crear experiencias web elegantes, funcionales y centradas en el usuario.
                </p>
                <div class="hero-cta-group">
                    <a href="#proyectos" class="cta-btn btn-filled">Ver Proyectos <i class="fas fa-arrow-right"></i></a>
                    <a href="#contacto" class="cta-btn btn-outline">Contáctame <i
                            class="fas fa-external-link-alt"></i></a>
                </div>
            </div>

            <div class="hero-graphics">
                <div class="cosmic-glow-ring">
                    <div class="display-avatar">
                        <img src="images/perfil.png" alt="Jose Manuel Diz Pernia">
                        <div class="avatar-vector"></div>
                    </div>
                </div>
            </div>
        </div>
    </section>

</html>
